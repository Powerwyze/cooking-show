<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cooking Show - Multiplayer</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; }
    .menu, .lobby, .game-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); margin-bottom: 20px; }
    .menu, .lobby { max-width: 600px; margin: 50px auto 20px; }
    h1, h2 { color: #667eea; margin-bottom: 20px; }
    h1 { font-size: 36px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 14px; }
    button { padding: 12px 24px; margin: 10px 5px 10px 0; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
    button:hover { background: #5568d3; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .hidden { display: none !important; }

    .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .header h2 { margin-bottom: 15px; }
    .scores { display: flex; gap: 10px; flex-wrap: wrap; }
    .score-box { background: #f0f0f0; padding: 12px; border-radius: 5px; min-width: 120px; text-align: center; font-weight: bold; }
    .score-box.you { background: #FFD700; }

    .game-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .section { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .section h3 { margin-bottom: 15px; color: #667eea; font-size: 16px; }

    .tray { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .ingredient-btn { padding: 10px; background: #FF6B6B; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; transition: all 0.2s; }
    .ingredient-btn:hover { background: #E55555; }

    .inventory { display: flex; flex-wrap: wrap; gap: 8px; }
    .inventory-item { background: #4CAF50; color: white; padding: 6px 10px; border-radius: 15px; font-size: 12px; }

    .recipes { max-height: 400px; overflow-y: auto; }
    .recipe-card { background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px solid #e0e0e0; margin-bottom: 8px; }
    .recipe-card strong { display: block; margin-bottom: 5px; }
    .recipe-card p { font-size: 11px; color: #666; margin: 3px 0; }
    .recipe-btn { padding: 6px 12px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; width: 100%; }
    .recipe-btn:hover { background: #5568d3; }
    .recipe-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #ccc; }

    .cooking-status { background: #FFF3CD; padding: 15px; border-radius: 5px; border: 2px solid #FFD700; }
    .cooking-status h4 { margin-bottom: 10px; }
    .cooking-status button { width: 100%; margin: 0; }

    .players-list { background: #f0f0f0; padding: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; }
    .player-item { padding: 8px; background: white; margin-bottom: 5px; border-radius: 3px; font-size: 14px; }
    .player-item.cpu { color: #888; font-style: italic; }

    .room-info { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; font-size: 12px; }

    .status-message { padding: 10px; background: #e8f5e9; border-left: 4px solid #4CAF50; border-radius: 3px; margin-bottom: 10px; }
    .status-message.error { background: #ffebee; border-left-color: #f44336; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Menu Screen -->
    <div id="menu" class="menu">
      <h1>🍳 The Cooking Show</h1>
      <p style="margin-bottom: 20px;">Competitive Cooking Game</p>
      <input id="playerName" type="text" placeholder="Your Name" value="Player1">
      <div class="button-group">
        <button onclick="createRoom()">Create Room</button>
        <button onclick="showJoinForm()">Join Room</button>
      </div>
      <div id="joinForm" class="hidden" style="margin-top: 20px;">
        <input id="roomId" type="text" placeholder="Room ID">
        <button onclick="joinRoom()">Join</button>
      </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby" class="lobby hidden">
      <h2>Waiting Room</h2>
      <div class="room-info">Room ID: <strong id="roomIdDisplay"></strong></div>
      <h3>Players (<span id="playerCount">0</span>):</h3>
      <div class="players-list" id="playersList"></div>
      <div class="button-group" style="margin-top: 20px;">
        <button onclick="addCPU()">Add CPU Player</button>
        <button onclick="startGameClick()" style="background: #4CAF50;">Start Game</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game" class="game-container hidden">
      <div class="header">
        <h2>Round <span id="roundNum">1</span>/3</h2>
        <div class="scores" id="scores"></div>
      </div>

      <div class="game-board">
        <div class="section">
          <h3>🍽️ Ingredient Tray</h3>
          <div class="tray" id="tray"></div>
        </div>

        <div class="section">
          <h3>📦 Your Inventory</h3>
          <div class="inventory" id="inventory"><p>No ingredients yet</p></div>
        </div>

        <div class="section">
          <h3>📖 Recipes</h3>
          <div class="recipes" id="recipes"></div>
        </div>

        <div class="section">
          <h3>🍳 Cooking</h3>
          <div id="cooking"><p>Select a recipe to cook</p></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const RECIPES = {
      carbonara: { name: 'Pasta Carbonara', ingredients: ['Eggs', 'Pasta', 'Bacon', 'Cheese'], difficulty: 2 },
      stirfry: { name: 'Stir Fry', ingredients: ['Vegetables', 'Protein', 'Soy Sauce', 'Oil'], difficulty: 1 },
      risotto: { name: 'Risotto', ingredients: ['Rice', 'Broth', 'Butter', 'Cheese'], difficulty: 3 },
      salmon: { name: 'Salmon with Lemon', ingredients: ['Fish', 'Lemon', 'Butter', 'Herbs'], difficulty: 2 },
      mousse: { name: 'Chocolate Mousse', ingredients: ['Chocolate', 'Eggs', 'Cream', 'Sugar'], difficulty: 3 },
      tacos: { name: 'Beef Tacos', ingredients: ['Beef', 'Tortillas', 'Toppings', 'Spices'], difficulty: 1 }
    };

    let socket = io();
    let gameState = {
      playerName: '',
      roomId: null,
      playerId: null,
      inventory: [],
      cooking: null,
      score: 0,
      round: 1,
      maxRounds: 3,
      tray: [],
      players: {},
      isGameActive: false
    };

    // Socket events
    socket.on('connect', () => {
      console.log('Connected to server');
    });

    socket.on('roomCreated', (data) => {
      gameState.roomId = data.roomId;
      showLobby();
    });

    socket.on('gameState', (state) => {
      updateGameState(state);
    });

    socket.on('roundStarted', (data) => {
      gameState.round = data.round;
      showGame();
    });

    socket.on('dishSubmitted', (data) => {
      if (data.success) {
        alert(`${data.message} +${data.score} points!`);
      } else {
        alert(data.message);
      }
      updateUI();
    });

    socket.on('error', (data) => {
      alert('Error: ' + data.message);
    });

    // UI Functions
    function showJoinForm() {
      document.getElementById('joinForm').classList.remove('hidden');
    }

    function createRoom() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) {
        alert('Please enter your name');
        return;
      }
      gameState.playerName = name;
      socket.emit('createRoom', { playerName: name, maxPlayers: 4 });
    }

    function joinRoom() {
      const name = document.getElementById('playerName').value.trim();
      const roomId = document.getElementById('roomId').value.trim();
      if (!name || !roomId) {
        alert('Please enter name and room ID');
        return;
      }
      gameState.playerName = name;
      gameState.roomId = roomId;
      socket.emit('joinRoom', { roomId, playerName: name });
      showLobby();
    }

    function addCPU() {
      socket.emit('addCPU', { roomId: gameState.roomId });
    }

    function startGameClick() {
      socket.emit('startGame', { roomId: gameState.roomId });
    }

    function pickIngredient(index) {
      socket.emit('pickIngredient', { roomId: gameState.roomId, ingredientIndex: index });
    }

    function startCooking(recipeKey) {
      socket.emit('startCooking', { roomId: gameState.roomId, recipeKey });
    }

    function submitDish() {
      socket.emit('submitDish', { roomId: gameState.roomId });
    }

    function updateGameState(state) {
      gameState.tray = state.tray || [];
      gameState.players = {};
      gameState.round = state.currentRound;

      state.players.forEach(p => {
        if (p.id === socket.id) {
          gameState.inventory = p.inventory || [];
          gameState.cooking = p.cooking;
          gameState.score = p.score;
        }
        gameState.players[p.id] = p;
      });

      if (state.gameActive) {
        showGame();
        updateUI();
      } else {
        showLobby();
        updateLobbyUI(state);
      }
    }

    function updateUI() {
      // Tray
      const trayHTML = gameState.tray.map((ing, idx) =>
        `<button class="ingredient-btn" onclick="pickIngredient(${idx})">${ing}</button>`
      ).join('');
      document.getElementById('tray').innerHTML = trayHTML || '<p>Tray is empty</p>';

      // Inventory
      const invHTML = gameState.inventory.length === 0 ? '<p>No ingredients</p>' :
        gameState.inventory.map(ing => `<span class="inventory-item">${ing}</span>`).join('');
      document.getElementById('inventory').innerHTML = invHTML;

      // Recipes
      const recipesHTML = Object.entries(RECIPES).map(([key, recipe]) => {
        const hasAll = recipe.ingredients.every(ing => gameState.inventory.includes(ing));
        const disabled = !hasAll || gameState.cooking;
        return `
          <div class="recipe-card">
            <strong>${recipe.name}</strong>
            <p>Difficulty: ${'⭐'.repeat(recipe.difficulty)}</p>
            <p>${recipe.ingredients.join(', ')}</p>
            <button class="recipe-btn" ${disabled ? 'disabled' : ''} onclick="startCooking('${key}')">Cook</button>
          </div>
        `;
      }).join('');
      document.getElementById('recipes').innerHTML = recipesHTML;

      // Cooking
      const cookingHTML = gameState.cooking ? `
        <div class="cooking-status">
          <h4>${gameState.cooking.recipe.name}</h4>
          <button onclick="submitDish()">Submit Dish</button>
        </div>
      ` : '<p>Select a recipe to cook</p>';
      document.getElementById('cooking').innerHTML = cookingHTML;

      // Scores
      const scoresHTML = Object.values(gameState.players)
        .sort((a, b) => b.score - a.score)
        .map(p => `
          <div class="score-box ${p.id === socket.id ? 'you' : ''}">
            <strong>${p.name}</strong><br>
            ${p.score} pts ${p.isCPU ? '(CPU)' : ''}
          </div>
        `).join('');
      document.getElementById('scores').innerHTML = scoresHTML;
      document.getElementById('roundNum').textContent = gameState.round;
    }

    function updateLobbyUI(state) {
      document.getElementById('roomIdDisplay').textContent = gameState.roomId;
      document.getElementById('playerCount').textContent = state.players.length;

      const playersHTML = state.players.map(p => `
        <div class="player-item ${p.isCPU ? 'cpu' : ''}">
          ${p.name} ${p.isCPU ? '(CPU)' : '(You)'}
        </div>
      `).join('');
      document.getElementById('playersList').innerHTML = playersHTML;
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('lobby').classList.add('hidden');
      document.getElementById('game').classList.add('hidden');
    }

    function showLobby() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('lobby').classList.remove('hidden');
      document.getElementById('game').classList.add('hidden');
    }

    function showGame() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('lobby').classList.add('hidden');
      document.getElementById('game').classList.remove('hidden');
    }
  </script>
</body>
</html>
